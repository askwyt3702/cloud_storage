<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 - Cloud Storage</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>

  <div class="cloud-box">

    <div class="top-area">

      <div class="brand">
        <div class="brand-icon">⚙</div>
        <div>
          <h1>設定</h1>
          <p class="brand-sub">アカウント情報</p>
        </div>
      </div>

      <div class="user-pill">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="テーマ切替" title="テーマ切替">☀</button>
        <button onclick="location.href='files.html'">← ファイルに戻る</button>
        <button class="logout-btn" onclick="logout()">ログアウト</button>
      </div>

    </div>

    <!-- プロフィールカード -->
    <div class="settings-section">
      <h2 class="settings-title">👤 プロフィール</h2>

      <div class="settings-profile">
        <div class="avatar" id="settingsAvatar" style="width:64px;height:64px;font-size:28px;">?</div>
        <div>
          <div class="settings-username" id="settingsUsername">読み込み中...</div>
          <div class="settings-role" id="settingsRole"></div>
        </div>
      </div>

      <div class="settings-rows">
        <div class="settings-row">
          <span class="settings-label">ユーザー名</span>
          <span class="settings-value" id="infoUsername">--</span>
        </div>
        <div class="settings-row">
          <span class="settings-label">権限（ロール）</span>
          <span class="settings-value" id="infoRole">--</span>
        </div>
        <div class="settings-row">
          <span class="settings-label">使用容量</span>
          <span class="settings-value" id="infoStorage">--</span>
        </div>
      </div>
    </div>

    <!-- セキュリティカード（準備中） -->
    <div class="settings-section">
      <h2 class="settings-title">🔒 セキュリティ</h2>

      <div class="settings-rows">
        <div class="settings-row">
          <div>
            <div class="settings-label">パスワード変更</div>
            <div class="settings-sub">パスワードを変更します</div>
          </div>
          <button disabled title="認証担当と連携して実装予定">準備中</button>
        </div>
        <div class="settings-row">
          <div>
            <div class="settings-label">2段階認証（MFA）</div>
            <div class="settings-sub">認証アプリでログインを保護</div>
          </div>
          <button disabled title="認証担当と連携して実装予定">準備中</button>
        </div>
      </div>
    </div>

    <!-- バックアップ設定（管理者限定、一般ユーザーは非表示） -->
    <div class="settings-section" id="backupSettingsSection" style="display: none;">
      <h2 class="settings-title">💾 自動バックアップ設定</h2>
      
      <div class="settings-rows">
        <div class="settings-row" style="align-items: center;">
          <div>
            <div class="settings-label">自動バックアップ</div>
            <div class="settings-sub">毎日指定した時刻に自動でバックアップを実行します</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="backupToggle">
            <span class="slider"></span>
          </label>
        </div>
        
        <div class="settings-row" style="align-items: center;">
          <div>
            <div class="settings-label">実行時刻 (24時間表記)</div>
            <div class="settings-sub">自動バックアップを実行する時刻 (例: 00:00)</div>
          </div>
          <input type="text" id="backupTime" class="settings-time-input" placeholder="00:00" style="width: 100px; text-align: center;">
        </div>

        <div class="settings-row" style="justify-content: flex-end; gap: 10px; border-bottom: none; padding-bottom: 0;">
          <button class="save-settings-btn" id="saveBackupBtn" onclick="saveBackupSettings(event)" style="background: #2563eb; padding: 10px 18px; border-radius: 12px; font-weight: bold;">💾 設定を保存</button>
          <button class="run-backup-btn" id="runBackupBtn" onclick="runManualBackup(event)" style="background: #10b981; padding: 10px 18px; border-radius: 12px; font-weight: bold;">⚡ 今すぐバックアップ</button>
        </div>
      </div>

      <div class="backup-history-section" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08);">
        <h3 class="settings-sub-title" style="color: white; font-size: 15px; margin-bottom: 12px; font-weight: bold;">📁 バックアップ履歴</h3>
        <div class="file-list" id="backupList">
          <!-- JSで動的に構築 -->
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>

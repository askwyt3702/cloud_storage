<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
 
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
 
<body>
 
<div class="login-box login-enhanced">

  <div class="login-brand">
    <div class="login-brand-icon">☁</div>
    <h1>Cloud Storage</h1>
    <p class="login-tagline">あなたのファイルを、いつでも・どこでも・安全に</p>
  </div>

  <div id="login-fields">
    <input type="email" id="email" placeholder="メールアドレス">
    <input type="password" id="password" placeholder="パスワード">
   
    <button onclick="login(event)">
      ログイン
    </button>
  </div>
 
  <div id="mfa-fields" style="display: none;">
    <p style="font-size: 14px; color: #666; margin-bottom: 10px;">
      スマートフォン認証アプリに表示されている<br>6桁の認証コードを入力してください。
    </p>
    <input type="text" id="mfa-code" placeholder="6桁の認証コード（例: 123456）" maxlength="6" style="text-align: center; letter-spacing: 2px;">
   
    <button onclick="verifyMFA(event)" style="background-color: #28a745;">
      認証してログイン
    </button>
  </div>
 
  <p class="register-text">
    アカウントをお持ちでない方は
    <a href="register.html">アカウントを作成</a>
  </p>

  <p class="register-text">
    <a href="reset.html">パスワードをお忘れですか？</a>
  </p>

  <div class="login-features">
    <span class="login-feature">🔒 2段階認証</span>
    <span class="login-feature">🔗 共有リンク</span>
    <span class="login-feature">🗑 ゴミ箱復元</span>
  </div>

</div>
 
  <script src="script.js"></script>
 
</body>
</html>

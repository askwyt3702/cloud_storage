<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クラウドストレージ</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>

  <div class="cloud-box">

    <div class="top-area">

      <div class="brand">
        <div class="brand-icon">☁</div>
        <div>
          <h1>Cloud Storage</h1>
          <p class="brand-sub">あなたのファイルをいつでもどこでも</p>
        </div>
      </div>

      <div class="user-pill">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-name" id="userName">ユーザー</div>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="テーマ切替" title="テーマ切替">☀</button>
        <button class="logout-btn" onclick="logout()">
          ログアウト
        </button>
      </div>

    </div>

    <!-- 通常のファイル一覧ビュー -->
    <div id="mainView">

      <!-- ダッシュボード（ようこそ＋容量＋統計） -->
      <div class="hero-card" id="heroCard">

        <div class="hero-welcome">
          <h2>おかえりなさい、<span id="heroUserName">ゲスト</span> さん</h2>
          <p id="storageText">使用容量を取得中...</p>
        </div>

        <div class="hero-stats">

          <div class="hero-stat">
            <div class="hero-stat-label">使用容量</div>
            <div class="hero-stat-value" id="heroStorageText">--</div>
            <div class="storage-gauge">
              <div class="storage-gauge-fill" id="heroStorageFill"></div>
            </div>
            <div class="hero-stat-sub" id="heroStoragePct">0%</div>
          </div>

          <div class="hero-stat">
            <div class="hero-stat-label">マイファイル</div>
            <div class="hero-stat-value" id="heroFileCount">--</div>
            <div class="hero-stat-sub">件</div>
          </div>

          <div class="hero-stat">
            <div class="hero-stat-label">あなたが共有中</div>
            <div class="hero-stat-value" id="heroSharedCount">--</div>
            <div class="hero-stat-sub">件</div>
          </div>

        </div>

      </div>

      <div class="upload-buttons">

        <input type="file" id="fileInput" hidden>

        <button onclick="document.getElementById('fileInput').click()">
          📁 ファイル選択
        </button>

        <button onclick="uploadSelectedFile(event)">
          ⬆ アップロード
        </button>

      </div>

      <!-- 選択中のファイル表示（選ぶまでは非表示） -->
      <div id="selectedFileInfo" class="selected-file" hidden></div>

      <div class="drop-area">
        <p class="drop-title">
          ファイルをドラッグ＆ドロップ
        </p>
        <p class="drop-sub">
          またはファイルを選択
        </p>
      </div>

      <!-- 操作バー：並び替え・一括削除・ゴミ箱 -->
      <div class="toolbar">

        <select id="sortSelect" class="sort-select" onchange="loadFiles()">
          <option value="name_asc">名前順（A→Z）</option>
          <option value="name_desc">名前順（Z→A）</option>
          <option value="date_desc">新しい順</option>
          <option value="date_asc">古い順</option>
          <option value="size_desc">サイズ大きい順</option>
          <option value="size_asc">サイズ小さい順</option>
        </select>

        <div class="toolbar-right">
          <button onclick="toggleSelectAll(this)">☑ 全選択</button>
          <button class="share-btn" onclick="shareSelected(event)">🔗 選択を共有</button>
          <button class="delete-btn" onclick="deleteSelected(event)">🗑 選択削除</button>
          <button onclick="showShared()">📂 共有一覧</button>
          <button onclick="showTrash()">🗑 ゴミ箱</button>
        </div>

      </div>

      <div class="file-list" id="fileList">
        <!-- ここに動的に追加される -->
      </div>

    </div>

    <!-- ゴミ箱ビュー（最初は非表示） -->
    <div id="trashView" style="display:none">

      <div class="toolbar">
        <button onclick="showFiles()">← ファイル一覧に戻る</button>
        <button class="delete-btn" onclick="emptyTrash(event)">ゴミ箱を空にする</button>
      </div>

      <div class="file-list" id="trashList">
        <!-- ゴミ箱の中身が動的に追加される -->
      </div>

    </div>

    <!-- 共有ビュー（最初は非表示） -->
    <div id="sharedView" style="display:none">

      <div class="toolbar">
        <button onclick="showFiles()">← ファイル一覧に戻る</button>
        <p class="storage-text">みんなが共有したファイル</p>
      </div>

      <div class="file-list" id="sharedList">
        <!-- 共有ファイルが動的に追加される -->
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>

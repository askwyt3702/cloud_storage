<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>共有ファイル - Cloud Storage</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>

  <div class="login-box" style="max-width:460px;">

    <div class="brand" style="justify-content:center; margin-bottom:10px;">
      <div class="brand-icon">☁</div>
      <div>
        <h1 style="font-size:22px;">Cloud Storage</h1>
        <p class="brand-sub">共有ファイル</p>
      </div>
    </div>

    <!-- 読み込み中 -->
    <div id="shareLoading" style="text-align:center; color:#cbd5e1; padding:20px;">
      読み込み中...
    </div>

    <!-- ファイル情報（読み込み後に表示） -->
    <div id="shareContent" style="display:none;">

      <div class="share-file-card">
        <div class="file-icon default-bg" id="shareIcon" style="width:70px;height:70px;font-size:32px;">
          <i class="fa-solid fa-file"></i>
        </div>
        <div class="share-file-name" id="shareFileName">ファイル名</div>
        <div class="share-file-meta" id="shareFileMeta">サイズ・種類</div>
      </div>

      <!-- パスワード入力（保護されている場合のみ表示） -->
      <div id="sharePasswordArea" style="display:none;">
        <input type="password" id="sharePassword" placeholder="このファイルのパスワード">
      </div>

      <button id="shareDownloadBtn" onclick="doShareDownload()">
        ⬇ ダウンロード
      </button>

      <p class="share-note" id="shareNote"></p>

    </div>

    <!-- エラー表示 -->
    <div id="shareError" style="display:none; text-align:center; padding:20px;">
      <i class="fa-solid fa-triangle-exclamation" style="font-size:48px; color:#f59e0b;"></i>
      <p id="shareErrorMsg" style="color:#e2e8f0; margin-top:16px;">エラー</p>
    </div>

  </div>

  <script src="share.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカウント作成</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

  <h1>アカウント作成</h1>

  <input
    type="text"
    id="username"
    placeholder="ユーザー名"
  >

  <input
    type="email"
    id="register-email"
    placeholder="メールアドレス"
  >

  <input
    type="password"
    id="register-password"
    placeholder="パスワード（8文字以上・大文字・数字・記号を含む）"
  >

  <input
    type="password"
    id="confirm-password"
    placeholder="パスワード（確認）"
  >

  <button onclick="register(event)">
    アカウントを作成
  </button>

  <p class="register-text">
    既にアカウントをお持ちの方は
    <a href="login.html">ログイン</a>
  </p>

</div>

  <script src="script.js"></script>

</body>
</html>
